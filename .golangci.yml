version: "2"
linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosec
    - ineffassign
    - depguard
    - gomoddirectives
  settings:
    depguard:
      rules:
        main:
          list-mode: strict
          allow:
            - $gostd
            - golang.org/x/
            - github.com/cpuguy83/go-md2man
            - github.com/inconshreveable/mousetrap
            - github.com/russross/blackfriday
            - github.com/spf13/cobra
            - github.com/spf13/pflag
            - gopkg.in/
            - go.yaml.in/
    errcheck:
      exclude-functions:
        - (*os.File).Close
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Print
        - fmt.Println
        - fmt.Printf
    gosec:
      excludes:
        - G304
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      - text: "Error return value of .*.Close"
        linters:
          - errcheck
