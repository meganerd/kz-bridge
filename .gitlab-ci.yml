include:
  - template: Security/Dependency-Scanning.gitlab-ci.yml

stages:
  - test
  - build
  - security

variables:
  GOPATH: ${CI_PROJECT_DIR}/.go
  GOFLAGS: "-mod=readonly"

default:
  image: golang:1.24
  tags:
    - docker
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/

test:
  stage: test
  script:
    - go test ./... -v -race -coverprofile=coverage.out
    - go tool cover -func=coverage.out
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.out
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'

lint:
  stage: test
  image: golangci/golangci-lint:v2.11
  script:
    - golangci-lint run --new-from-rev=${CI_MERGE_REQUEST_DIFF_BASE_SHA:-HEAD~1} ./...
    - golangci-lint run --new=false ./... || true

build:
  stage: build
  script:
    - go build -ldflags "-X main.version=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}" -o kz-bridge ./cmd/kz-bridge/
  artifacts:
    paths:
      - kz-bridge
    expire_in: 1 week
  needs:
    - test
    - lint

govulncheck:
  stage: security
  image: golang:1.24
  script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - $GOPATH/bin/govulncheck ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG

nancy:
  stage: security
  image: golang:1.24
  script:
    - go install github.com/sonatype-nexus-community/nancy@latest
    - go list -json -deps ./... | $GOPATH/bin/nancy sleuth
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG

sbom:
  stage: security
  image: golang:1.24
  script:
    - go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
    - $GOPATH/bin/cyclonedx-gomod app -json -output bom.json
  artifacts:
    paths:
      - bom.json
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
